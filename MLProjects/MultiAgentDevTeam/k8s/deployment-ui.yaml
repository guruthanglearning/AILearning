apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: multi-agent-dev-team
  labels:
    app: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: multi-agent-dev-team-ui:latest
          imagePullPolicy: Never        # Use local image (Docker Desktop K8s)
          ports:
            - containerPort: 80
          env:
            - name: API_HOST
              value: orchestrator-service
            - name: API_PORT
              value: "5000"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
