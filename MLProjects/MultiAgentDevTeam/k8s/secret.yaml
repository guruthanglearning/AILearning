apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: multi-agent-dev-team
type: Opaque
stringData:
  # Replace with your actual Anthropic API key before applying
  # Recommended: use kubectl create secret instead of storing key in this file
  # kubectl create secret generic agent-secrets \
  #   --from-literal=ANTHROPIC_API_KEY=your-key-here \
  #   -n multi-agent-dev-team
  ANTHROPIC_API_KEY: "REPLACE_WITH_ACTUAL_KEY"
