apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: multi-agent-dev-team
  labels:
    app: ui
spec:
  type: NodePort
  selector:
    app: ui
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30000    # Access at http://localhost:30000
