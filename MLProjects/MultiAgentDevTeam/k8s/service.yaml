apiVersion: v1
kind: Service
metadata:
  name: orchestrator-service
  namespace: multi-agent-dev-team
  labels:
    app: orchestrator
spec:
  type: NodePort
  selector:
    app: orchestrator
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30080    # Access at http://localhost:30080
