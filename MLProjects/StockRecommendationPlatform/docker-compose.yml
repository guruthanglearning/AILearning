services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rec
      POSTGRES_PASSWORD: rec
      POSTGRES_DB: recommendation
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rec -d recommendation"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    environment:
      DATABASE_URL: postgresql+asyncpg://rec:rec@postgres:5432/recommendation
      REDIS_URL: redis://redis:6379/0
      USE_REDIS: "true"
      POLYGON_API_KEY: "${POLYGON_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      FINNHUB_API_KEY: "${FINNHUB_API_KEY:-}"
      CORS_ORIGINS: "http://localhost:3010,http://localhost:3000,http://localhost:3001,http://stockresearch.local,http://stockresearch.local:8080"
      AGENT_TIMEOUT_SECONDS: "45"
      QUOTE_STALE_SECONDS: "120"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8010"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked in at build time — must be passed as build args.
        # Use localhost so the host browser can reach the mapped port.
        # Override NEXT_PUBLIC_API_URL for remote deploys (e.g. your server's IP).
        NEXT_PUBLIC_API_URL: "http://api.stockresearch.local:8080"
    ports:
      - "3010:3000"
    depends_on:
      - app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
