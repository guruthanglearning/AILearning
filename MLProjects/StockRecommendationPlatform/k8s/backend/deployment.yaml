apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: stockresearch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: alembic-migrate
          image: stockresearch-backend:latest
          imagePullPolicy: Never
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stockresearch-secret
                  key: DATABASE_URL
      containers:
        - name: backend
          image: stockresearch-backend:latest
          imagePullPolicy: Never
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8010"]
          ports:
            - containerPort: 8010
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stockresearch-secret
                  key: DATABASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stockresearch-secret
                  key: ANTHROPIC_API_KEY
            - name: POLYGON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stockresearch-secret
                  key: POLYGON_API_KEY
            - name: FINNHUB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stockresearch-secret
                  key: FINNHUB_API_KEY
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: stockresearch-config
                  key: REDIS_URL
            - name: USE_REDIS
              valueFrom:
                configMapKeyRef:
                  name: stockresearch-config
                  key: USE_REDIS
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: stockresearch-config
                  key: CORS_ORIGINS
            - name: AGENT_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: stockresearch-config
                  key: AGENT_TIMEOUT_SECONDS
            - name: QUOTE_STALE_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: stockresearch-config
                  key: QUOTE_STALE_SECONDS
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8010
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
