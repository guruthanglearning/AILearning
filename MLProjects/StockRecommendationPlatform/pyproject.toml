[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "UP"]
ignore = [
    "UP007",  # X | Y union already used throughout; ignore any stray Optional[]
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.coverage.run]
source = ["app"]
omit = ["*/alembic/*", "*/migrations/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
