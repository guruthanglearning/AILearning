version: '3.8'

services:
  # FastAPI Backend Service
  fraud-detection-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fraud-detection-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DEBUG=False
      - LOG_LEVEL=INFO
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_KEY=${API_KEY:-development_api_key_for_testing}
      
      # LLM Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_API_URL=${OLLAMA_API_URL:-http://localhost:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      
      # Database Configuration
      - USE_PINECONE=False
      - CHROMA_DB_PATH=/app/data/chroma_db
      - CHROMA_COLLECTION_NAME=fraud_patterns
      
      # ML Configuration
      - ML_MODEL_PATH=/app/data/models/
      - FRAUD_THRESHOLD=0.5
      - CONFIDENCE_THRESHOLD=0.7
      
      # Security
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-key-change-in-production}
      - CORS_ORIGINS=http://localhost:8501,http://fraud-detection-ui:8501
    
    volumes:
      # Shared model volume
      - model-data:/app/data/models
      # ChromaDB vector database
      - chroma-data:/app/data/chroma_db
      # Fraud patterns data
      - pattern-data:/app/data/patterns
      # Application logs
      - ./logs/api:/app/logs
    
    networks:
      - fraud-detection-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Streamlit UI Service
  fraud-detection-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: fraud-detection-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://fraud-detection-api:8000
      - API_BASE_URL=http://fraud-detection-api:8000
      - API_KEY=${API_KEY:-development_api_key_for_testing}
    
    volumes:
      # Application logs
      - ./logs/ui:/app/logs
    
    networks:
      - fraud-detection-network
    
    depends_on:
      - fraud-detection-api
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: fraud-detection-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - fraud-detection-network
    depends_on:
      - fraud-detection-api

  # Optional: Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: fraud-detection-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    networks:
      - fraud-detection-network
    depends_on:
      - prometheus

# Named volumes for persistent data
volumes:
  model-data:
    driver: local
  chroma-data:
    driver: local
  pattern-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# Network for inter-container communication
networks:
  fraud-detection-network:
    driver: bridge
